name: fmrg_env
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
      # Core deep learning (use PyTorch index for CUDA builds)
      - --extra-index-url https://download.pytorch.org/whl/cu121
      - torch==2.5.1+cu121
      - torchvision==0.20.1+cu121
      - triton==3.1.0

      # Diffusion / generative models
      - diffusers==0.34.0
      - timm==1.0.11
      - accelerate==1.12.0

      # FLUX FlowMap dependencies
      - transformers>=4.41.2
      - sentencepiece
      - peft>=0.11.1

      # Scientific computing
      - numpy==2.0.2
      - scipy==1.13.1
      - matplotlib==3.9.4
      - pandas==2.3.3
      - pillow==11.3.0

      # Hugging Face ecosystem
      - huggingface-hub==0.34.4
      - safetensors==0.6.2
      - datasets==4.4.1

      # Config and utilities
      - hydra-core==1.3.0
      - omegaconf==2.3.0
      - munch
      - pyyaml==6.0.2
      - yacs==0.1.8

      # Utilities used by samplers
      - einops
      - ftfy            # Text processing for CLIP
      - regex
      - protobuf
      - tqdm
      - gdown==5.2.0
      - setuptools<70   # keep pkg_resources for the CLIP install in install.sh

      # Metrics
      - torchmetrics==1.3.2
      - lpips==0.1.4
      - scikit-image
      - pytorch-msssim

      # Reward backends are installed by install.sh with
      # --no-build-isolation. Their setup.py modules `import pkg_resources`,
      # which has been removed from setuptools 71+; pip's isolated build env
      # always grabs the latest setuptools, so they have to bypass it.
